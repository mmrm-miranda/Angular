<div class="container">

    <div class="row">
        <div class="col">

            <div class="featured-boxes">
                <div class="row">
                    <div class="col-md-6 estilos2">
                        <div class="featured-box featured-box-primary text-left mt-5">
                            <div class="box-content">
                                <input [(ngModel)]="texto" class="form-control form-control-lg" disabled />
                                <!--Solo se coloca que se vea comunicacion unidireccional-->
                                <span>{{texto.toLowerCase()}}</span><br/><!--Interpolacion-->
                                <span [innerText]="texto.toUpperCase()"></span><!--InnerText-->
                                <span [innerHtml]="texto.toUpperCase()"></span><!--InnerText mandando a llamar un codigo de html por ejemplo un h1-->

                                <!---->
                                <form action="/" id="frmSignIn" method="post">
                                    <div class="form-row">
                                        <div class="form-group col">
                                            <label>Username or E-mail Address</label>
                                            <input [(ngModel)]="mail" [ngModelOptions]="{standalone: true}" type="text" value="" class="form-control form-control-lg">
                                        </div>
                                    </div>
                                    <div class="form-row">
                                        <div class="form-group col">
                                            <a class="float-right" href="#">(Lost Password?)</a>
                                            <label>Password</label>
                                            <input [(ngModel)]="pas" [ngModelOptions]="{standalone: true}" type="password" value="" class="form-control form-control-lg">
                                            
                                        </div>
                                    </div>
                                    <div class="form-row">
                                        <div class="form-group col-lg-6">
                                            <div class="form-check form-check-inline">
                                                <label class="form-check-label">
                                                    <input class="form-check-input" type="checkbox" id="rememberme" name="rememberme"> Remember Me
                                                </label>
                                            </div>
                                        </div>
                                        <div class="form-group col-lg-6">
                                            <input (click)="navegarConValor()" type="submit" value="Login" class="btn btn-primary float-right mb-5" data-loading-text="Loading...">
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                    
                </div>

            </div>
        </div>
    </div>

</div>
